<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>🌟 Стильный магазин</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Главная карточка */
        .main-card {
            background: white;
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
        }

        /* Шапка */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo span {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-text-fill-color: white;
            font-size: 14px;
            padding: 5px 15px;
            border-radius: 50px;
        }

        /* Статус пользователя */
        .user-status {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 12px 25px;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            box-shadow: 0 5px 15px rgba(245,87,108,0.3);
        }

        /* Форма входа */
        .login-box {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 20px;
            padding: 25px;
            border: 2px solid rgba(255,255,255,0.5);
        }

        .login-title {
            font-size: 24px;
            color: #2c3e50;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #34495e;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
        }

        .input-group input {
            width: 100%;
            padding: 15px 20px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            box-shadow: 0 8px 25px rgba(102,126,234,0.3);
            transform: translateY(-2px);
        }

        .btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(102,126,234,0.3);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(102,126,234,0.4);
        }

        .btn-logout {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            padding: 12px 25px;
            width: auto;
        }

        .btn-add {
            background: linear-gradient(135deg, #a8e063, #56ab2f);
            box-shadow: 0 10px 20px rgba(86,171,47,0.3);
        }

        .btn-add:hover {
            box-shadow: 0 15px 30px rgba(86,171,47,0.4);
        }

        /* Карточка добавления */
        .add-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 25px;
            border: 2px solid rgba(86,171,47,0.3);
        }

        .add-title {
            font-size: 22px;
            color: #2c3e50;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 15px;
        }

        @media (max-width: 700px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        /* Сетка товаров */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .product-card {
            background: white;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 45px rgba(102,126,234,0.2);
        }

        .product-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .seller-badge {
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
        }

        .product-body {
            padding: 20px;
        }

        .product-name {
            font-size: 20px;
            font-weight: 800;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .product-price {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .product-price::after {
            content: " ₽";
            font-size: 18px;
            color: #95a5a6;
        }

        .product-footer {
            padding: 15px 20px;
            background: #f8f9fa;
            border-top: 2px dashed #dee2e6;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .delete-btn {
            background: linear-gradient(135deg, #ff6b6b, #ee5253);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .delete-btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(238,82,83,0.4);
        }

        .delete-btn:disabled {
            background: #b2bec3;
            cursor: not-allowed;
        }

        .owner-tag {
            background: linear-gradient(135deg, #00b09b, #96c93d);
            color: white;
            padding: 3px 12px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: bold;
        }

        /* Уведомление */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            border-radius: 20px;
            padding: 15px 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            transform: translateX(400px);
            transition: 0.3s;
            border-left: 8px solid #667eea;
            font-weight: 600;
            z-index: 1000;
        }

        .notification.show {
            transform: translateX(0);
        }

        /* Скрытый код */
        .hidden-code {
            display: none;
        }

        /* Анимации */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .welcome-animation {
            animation: pulse 0.5s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Главная карточка -->
        <div class="main-card">
            <div class="header">
                <div class="logo">
                    🛍️ SHOP
                    <span>PRO</span>
                </div>
                <div id="userStatus" class="user-status">
                    👤 Гость
                </div>
            </div>

            <!-- Блок входа (виден только гость) -->
            <div id="loginBlock">
                <div class="login-box">
                    <div class="login-title">
                        🔐 Вход в магазин
                    </div>
                    <div class="input-group">
                        <label>Ваше имя</label>
                        <input type="text" id="userName" placeholder="Введите ваше имя">
                    </div>
                    <div class="input-group">
                        <label>Код доступа (только для админа)</label>
                        <input type="password" id="adminPass" placeholder="Если вы админ">
                    </div>
                    <button class="btn" onclick="login()">🚀 Войти</button>
                </div>
            </div>

            <!-- Информация о пользователе (видна после входа) -->
            <div id="userInfoBlock" style="display: none;">
                <div class="login-box" style="background: linear-gradient(135deg, #a8e063, #56ab2f);">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <div style="font-size: 20px; font-weight: bold; color: white; margin-bottom: 5px;" id="welcomeMessage"></div>
                            <div style="color: rgba(255,255,255,0.9);" id="userRole"></div>
                        </div>
                        <button class="btn btn-logout" onclick="logout()">🚪 Выйти</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Добавление товара (видно только после входа) -->
        <div id="addBlock" class="add-card" style="display: none;">
            <div class="add-title">
                ➕ Добавить новый товар
            </div>
            <div class="form-row">
                <div class="input-group">
                    <label>Название</label>
                    <input type="text" id="productName" placeholder="Например: iPhone 13">
                </div>
                <div class="input-group">
                    <label>Цена (₽)</label>
                    <input type="number" id="productPrice" placeholder="Сколько стоит?">
                </div>
                <button class="btn btn-add" onclick="addProduct()">➕ Добавить</button>
            </div>
        </div>

        <!-- Список товаров -->
        <div class="main-card">
            <h2 style="margin-bottom: 20px; color: #2c3e50;">📦 Все товары</h2>
            <div id="productsList" class="products-grid"></div>
        </div>
    </div>

    <!-- Уведомление -->
    <div id="notification" class="notification"></div>

    <!-- Код администратора (НИКОМУ НЕ ВИДЕН) -->
    <div class="hidden-code"></div>

    <script>
        // 🔥 СЕКРЕТНЫЙ КОД АДМИНА (НИКТО НЕ УВИДИТ)
        const ADMIN_CODE = '6769';
        
        // Данные
        let products = [];
        let currentUser = null;

        // Загрузка при старте
        function init() {
            loadProducts();
            checkSavedUser();
        }

        // Загрузка товаров
        function loadProducts() {
            let saved = localStorage.getItem('shop_data');
            if (saved) {
                products = JSON.parse(saved);
            } else {
                // Тестовые товары
                products = [
                    {id: 1, name: 'MacBook Pro', price: 150000, user: 'Алексей', userId: 'user1'},
                    {id: 2, name: 'AirPods Pro', price: 25000, user: 'Елена', userId: 'user2'},
                    {id: 3, name: 'iPad Air', price: 65000, user: 'Дмитрий', userId: 'user3'}
                ];
                saveProducts();
            }
            showProducts();
        }

        // Сохранение товаров
        function saveProducts() {
            localStorage.setItem('shop_data', JSON.stringify(products));
        }

        // Проверка сохраненного пользователя
        function checkSavedUser() {
            let saved = localStorage.getItem('shop_user');
            if (saved) {
                currentUser = JSON.parse(saved);
                showUserInterface();
            }
        }

        // Вход
        function login() {
            let name = document.getElementById('userName').value.trim();
            let pass = document.getElementById('adminPass').value;

            if (!name) {
                showNotification('⚠️ Введите имя!', 'error');
                return;
            }

            // Проверка админского кода (секретно)
            let isAdmin = (pass === ADMIN_CODE);

            currentUser = {
                id: 'user_' + Date.now(),
                name: name,
                isAdmin: isAdmin
            };

            localStorage.setItem('shop_user', JSON.stringify(currentUser));
            
            document.getElementById('loginBlock').style.display = 'none';
            showUserInterface();
            
            showNotification(`✨ Добро пожаловать, ${name}! ${isAdmin ? '👑 Админ' : ''}`);
        }

        // Выход
        function logout() {
            currentUser = null;
            localStorage.removeItem('shop_user');
            
            document.getElementById('loginBlock').style.display = 'block';
            document.getElementById('userInfoBlock').style.display = 'none';
            document.getElementById('addBlock').style.display = 'none';
            
            document.getElementById('userName').value = '';
            document.getElementById('adminPass').value = '';
            
            document.getElementById('userStatus').innerHTML = '👤 Гость';
            
            showProducts();
            showNotification('👋 До свидания!');
        }

        // Показ интерфейса пользователя
        function showUserInterface() {
            document.getElementById('loginBlock').style.display = 'none';
            document.getElementById('userInfoBlock').style.display = 'block';
            document.getElementById('addBlock').style.display = 'block';
            
            document.getElementById('welcomeMessage').innerHTML = `👋 Привет, ${currentUser.name}!`;
            document.getElementById('userRole').innerHTML = currentUser.isAdmin ? '👑 Администратор' : '🛒 Покупатель';
            document.getElementById('userStatus').innerHTML = `👤 ${currentUser.name} ${currentUser.isAdmin ? '👑' : ''}`;
            
            showProducts();
        }

        // Добавление товара
        function addProduct() {
            if (!currentUser) {
                showNotification('⚠️ Сначала войдите!', 'error');
                return;
            }

            let name = document.getElementById('productName').value.trim();
            let price = document.getElementById('productPrice').value;

            if (!name || !price) {
                showNotification('⚠️ Заполните все поля!', 'error');
                return;
            }

            if (price <= 0) {
                showNotification('⚠️ Цена должна быть больше 0!', 'error');
                return;
            }

            let newProduct = {
                id: Date.now(),
                name: name,
                price: Number(price),
                user: currentUser.name,
                userId: currentUser.id
            };

            products.push(newProduct);
            saveProducts();

            document.getElementById('productName').value = '';
            document.getElementById('productPrice').value = '';

            showProducts();
            showNotification('✅ Товар добавлен!');
        }

        // Удаление товара
        function deleteProduct(id, userId) {
            if (!currentUser) {
                showNotification('⚠️ Сначала войдите!', 'error');
                return;
            }

            if (currentUser.isAdmin || currentUser.id === userId) {
                if (confirm('Удалить этот товар?')) {
                    products = products.filter(p => p.id !== id);
                    saveProducts();
                    showProducts();
                    showNotification('🗑️ Товар удален');
                }
            } else {
                showNotification('⛔ Это не ваш товар!', 'error');
            }
        }

        // Показать товары
        function showProducts() {
            let list = document.getElementById('productsList');
            
            if (products.length === 0) {
                list.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px; color:#95a5a6;">🛒 Товаров пока нет</div>';
                return;
            }

            let html = '';
            for (let p of products) {
                let canDelete = currentUser && (currentUser.isAdmin || currentUser.id === p.userId);
                
                html += `
                    <div class="product-card">
                        <div class="product-header">
                            <span>👤 ${p.user}</span>
                            ${currentUser && currentUser.id === p.userId ? '<span class="seller-badge">Владелец</span>' : ''}
                        </div>
                        <div class="product-body">
                            <div class="product-name">${escapeHtml(p.name)}</div>
                            <div class="product-price">${p.price.toLocaleString()}</div>
                        </div>
                        <div class="product-footer">
                            <span>#${p.id.toString().slice(-4)}</span>
                            ${canDelete ? 
                                `<button class="delete-btn" onclick="deleteProduct(${p.id}, '${p.userId}')">🗑️ Удалить</button>` : 
                                `<button class="delete-btn" disabled>🔒 Чужой товар</button>`
                            }
                        </div>
                    </div>
                `;
            }
            
            list.innerHTML = html;
        }

        // Защита от XSS
        function escapeHtml(text) {
            let div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Уведомления
        function showNotification(text, type = 'success') {
            let notif = document.getElementById('notification');
            notif.innerHTML = text;
            notif.style.borderLeftColor = type === 'success' ? '#56ab2f' : '#ff6b6b';
            notif.classList.add('show');
            
            setTimeout(() => {
                notif.classList.remove('show');
            }, 3000);
        }

        // Запуск
        init();
    </script>
</body>
    </html>
