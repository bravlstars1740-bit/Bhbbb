<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Простой магазин</title>
    <style>
        body {
            font-family: Arial;
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        input, button {
            padding: 10px;
            margin: 5px;
            font-size: 16px;
            width: 90%;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            width: auto;
        }
        button:hover {
            background: #45a049;
        }
        .product {
            border: 1px solid #ddd;
            padding: 10px;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .delete {
            background: #ff4444;
            padding: 5px 10px;
        }
        .delete:hover {
            background: #cc0000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛒 Мой магазин</h1>
        
        <!-- Форма добавления -->
        <div>
            <input type="text" id="nameInput" placeholder="Название товара">
            <input type="number" id="priceInput" placeholder="Цена">
            <button onclick="addProduct()">➕ ДОБАВИТЬ ТОВАР</button>
        </div>

        <!-- Список товаров -->
        <div id="productsList"></div>
    </div>

    <script>
        // Загружаем товары из localStorage
        let products = [];

        // Функция для загрузки
        function loadProducts() {
            let saved = localStorage.getItem('shop_products');
            if (saved) {
                products = JSON.parse(saved);
            }
            showProducts();
        }

        // Функция для показа товаров
        function showProducts() {
            let list = document.getElementById('productsList');
            
            if (products.length === 0) {
                list.innerHTML = '<p>Товаров пока нет. Добавьте первый!</p>';
                return;
            }

            let html = '<h2>Все товары:</h2>';
            for (let i = 0; i < products.length; i++) {
                html += `
                    <div class="product">
                        <span>
                            <strong>${products[i].name}</strong> - ${products[i].price} ₽
                        </span>
                        <button class="delete" onclick="deleteProduct(${i})">Удалить</button>
                    </div>
                `;
            }
            list.innerHTML = html;
        }

        // Функция добавления
        function addProduct() {
            let name = document.getElementById('nameInput').value;
            let price = document.getElementById('priceInput').value;

            if (name === '' || price === '') {
                alert('Заполните все поля!');
                return;
            }

            if (isNaN(price) || price <= 0) {
                alert('Введите правильную цену!');
                return;
            }

            // Добавляем товар
            products.push({
                name: name,
                price: price
            });

            // Сохраняем
            localStorage.setItem('shop_products', JSON.stringify(products));

            // Очищаем поля
            document.getElementById('nameInput').value = '';
            document.getElementById('priceInput').value = '';

            // Показываем обновленный список
            showProducts();

            alert('Товар добавлен!');
        }

        // Функция удаления
        function deleteProduct(index) {
            if (confirm('Удалить товар?')) {
                products.splice(index, 1);
                localStorage.setItem('shop_products', JSON.stringify(products));
                showProducts();
            }
        }

        // Загружаем товары при старте
        loadProducts();
    </script>
</body>
</html>
