<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Простой магазин</title>
    <style>
        body {
            font-family: Arial;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: #f0f0f0;
        }
        .block {
            background: white;
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
        }
        input, button {
            padding: 10px;
            margin: 5px;
            font-size: 16px;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            padding: 10px 20px;
        }
        button:hover {
            background: #45a049;
        }
        .product {
            border: 1px solid #ddd;
            padding: 10px;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
        }
        .delete {
            background: #ff4444;
        }
        .delete:hover {
            background: #cc0000;
        }
        .user-info {
            background: #e3f2fd;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>🛒 Мой магазин</h1>
    
    <!-- Блок входа -->
    <div class="block" id="loginBlock">
        <h3>Вход в магазин</h3>
        <input type="text" id="userName" placeholder="Ваше имя">
        <input type="password" id="adminPass" placeholder="Пароль админа (6769)">
        <button onclick="login()">Войти</button>
    </div>

    <!-- Информация о пользователе -->
    <div class="block user-info" id="userInfo" style="display: none;">
        <p id="userDisplay"></p>
        <button onclick="logout()">Выйти</button>
    </div>

    <!-- Добавление товара (видно только после входа) -->
    <div class="block" id="addBlock" style="display: none;">
        <h3>Добавить товар</h3>
        <input type="text" id="productName" placeholder="Название">
        <input type="number" id="productPrice" placeholder="Цена">
        <button onclick="addProduct()">Добавить</button>
    </div>

    <!-- Список товаров -->
    <div class="block">
        <h3>Все товары</h3>
        <div id="productsList"></div>
    </div>

    <script>
        // Данные
        let products = [];
        let currentUser = null;
        const ADMIN_CODE = '6769';

        // Загрузка при старте
        function init() {
            // Загружаем товары
            let saved = localStorage.getItem('shop_items');
            if (saved) {
                products = JSON.parse(saved);
            } else {
                // Тестовые товары
                products = [
                    {id: 1, name: 'Телефон', price: 25000, user: 'Анна', userId: 'user1'},
                    {id: 2, name: 'Наушники', price: 3000, user: 'Иван', userId: 'user2'}
                ];
                saveProducts();
            }
            
            // Проверяем, может есть сохраненный вход
            let savedUser = localStorage.getItem('shop_user');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                showUserInterface();
            }
            
            showProducts();
        }

        // Сохранение товаров
        function saveProducts() {
            localStorage.setItem('shop_items', JSON.stringify(products));
        }

        // Вход
        function login() {
            let name = document.getElementById('userName').value;
            let pass = document.getElementById('adminPass').value;
            
            if (name === '') {
                alert('Введите имя!');
                return;
            }
            
            // Проверка на админа
            let isAdmin = (pass === ADMIN_CODE);
            
            currentUser = {
                id: 'user_' + Date.now(),
                name: name,
                isAdmin: isAdmin
            };
            
            // Сохраняем вход
            localStorage.setItem('shop_user', JSON.stringify(currentUser));
            
            // Прячем форму входа
            document.getElementById('loginBlock').style.display = 'none';
            
            // Показываем интерфейс
            showUserInterface();
            
            alert('Добро пожаловать, ' + name + (isAdmin ? ' (Админ)' : ''));
        }

        // Выход
        function logout() {
            currentUser = null;
            localStorage.removeItem('shop_user');
            
            document.getElementById('loginBlock').style.display = 'block';
            document.getElementById('userInfo').style.display = 'none';
            document.getElementById('addBlock').style.display = 'none';
            
            document.getElementById('userName').value = '';
            document.getElementById('adminPass').value = '';
            
            showProducts();
        }

        // Показываем интерфейс пользователя
        function showUserInterface() {
            document.getElementById('loginBlock').style.display = 'none';
            document.getElementById('userInfo').style.display = 'block';
            document.getElementById('addBlock').style.display = 'block';
            
            let status = 'Вы вошли как: ' + currentUser.name;
            if (currentUser.isAdmin) status += ' (Администратор)';
            document.getElementById('userDisplay').innerHTML = status;
            
            showProducts();
        }

        // Добавление товара
        function addProduct() {
            if (!currentUser) {
                alert('Сначала войдите!');
                return;
            }
            
            let name = document.getElementById('productName').value;
            let price = document.getElementById('productPrice').value;
            
            if (name === '' || price === '') {
                alert('Заполните все поля!');
                return;
            }
            
            if (price <= 0) {
                alert('Цена должна быть больше 0!');
                return;
            }
            
            let newProduct = {
                id: Date.now(),
                name: name,
                price: Number(price),
                user: currentUser.name,
                userId: currentUser.id
            };
            
            products.push(newProduct);
            saveProducts();
            
            document.getElementById('productName').value = '';
            document.getElementById('productPrice').value = '';
            
            showProducts();
            alert('Товар добавлен!');
        }

        // Удаление товара
        function deleteProduct(id, userId) {
            if (!currentUser) {
                alert('Сначала войдите!');
                return;
            }
            
            // Может удалять: админ ИЛИ владелец
            if (currentUser.isAdmin || currentUser.id === userId) {
                if (confirm('Удалить товар?')) {
                    products = products.filter(p => p.id !== id);
                    saveProducts();
                    showProducts();
                }
            } else {
                alert('Это не ваш товар!');
            }
        }

        // Показать товары
        function showProducts() {
            let list = document.getElementById('productsList');
            
            if (products.length === 0) {
                list.innerHTML = '<p>Товаров пока нет</p>';
                return;
            }
            
            let html = '';
            for (let i = 0; i < products.length; i++) {
                let p = products[i];
                
                // Проверяем, может ли текущий пользователь удалить этот товар
                let canDelete = currentUser && (currentUser.isAdmin || currentUser.id === p.userId);
                
                html += '<div class="product">';
                html += '<div><strong>' + p.name + '</strong> - ' + p.price + ' ₽<br>';
                html += '<small>Продавец: ' + p.user + '</small></div>';
                
                if (canDelete) {
                    html += '<button class="delete" onclick="deleteProduct(' + p.id + ', \'' + p.userId + '\')">Удалить</button>';
                } else {
                    html += '<button disabled style="background:#ccc;">Чужой товар</button>';
                }
                
                html += '</div>';
            }
            
            list.innerHTML = html;
        }

        // Запуск
        init();
    </script>
</body>

            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #ff4757;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Шапка -->
        <div class="header">
            <div class="header-top">
                <div class="logo">
                    🛍️ Защищенный магазин
                    <span>Бета</span>
                </div>
                
                <!-- Профиль пользователя -->
                <div id="profileSection" class="profile">
                    <!-- Заполняется через JS -->
                </div>
            </div>

            <!-- Форма входа (показывается только если не залогинен) -->
            <div id="loginSection" class="login-section">
                <div class="login-form">
                    <div class="login-input">
                        <label>👤 Ваше имя</label>
                        <input type="text" id="loginName" placeholder="Введите имя" maxlength="30">
                    </div>
                    <div class="login-input">
                        <label>🔑 Код администратора (если есть)</label>
                        <input type="password" id="adminCode" placeholder="Оставьте пустым для обычного пользователя">
                    </div>
                    <button class="login-btn" onclick="login()">Войти в магазин</button>
                </div>
                <small style="color: #999; margin-top: 10px; display: block;">
                    * Админ-код: 6769 (для администраторов)
                </small>
            </div>
        </div>

        <!-- Админ-панель (видна только админу) -->
        <div id="adminPanel" class="admin-panel" style="display: none;">
            <h3>🔐 Панель администратора</h3>
            <div class="admin-stats">
                <div class="stat-card">
                    <div class="stat-number" id="totalProducts">0</div>
                    <div>Всего товаров</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalUsers">0</div>
                    <div>Продавцов</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalPrice">0</div>
                    <div>Сумма всех товаров</div>
                </div>
            </div>
        </div>

        <!-- Форма добавления товара (только для залогиненных) -->
        <div id="addFormSection" class="add-form" style="display: none;">
            <h2>📦 Добавить новый товар</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>Название товара</label>
                    <input type="text" id="productName" placeholder="Например: iPhone 13" maxlength="50">
                </div>
                <div class="form-group">
                    <label>Цена (₽)</label>
                    <input type="number" id="productPrice" placeholder="Сколько стоит?" min="0">
                </div>
            </div>
            <button class="btn-add" onclick="addProduct()">
                ➕ Выложить товар
            </button>
        </div>

        <!-- Сетка товаров -->
        <div id="productsContainer" class="products-grid"></div>
    </div>

    <!-- Уведомление -->
    <div id="notification" class="notification"></div>

    <script>
        // Данные
        let products = [];
        let currentUser = null;
        
        // ИЗМЕНЕНО: админ-код теперь 6769
        const ADMIN_CODE = '6769';

        // Загрузка при старте
        function init() {
            loadProducts();
            checkSavedUser();
        }

        // Проверка сохраненного пользователя
        function checkSavedUser() {
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                updateUI();
            }
        }

        // Загрузка товаров
        function loadProducts() {
            const saved = localStorage.getItem('secure_shop_products');
            if (saved) {
                products = JSON.parse(saved);
            } else {
                // Тестовые товары
                products = [
                    {
                        id: Date.now() - 1000000,
                        name: 'iPhone 13',
                        price: 65000,
                        seller: 'Алексей',
                        sellerId: 'user1',
                        date: new Date().toLocaleString()
                    },
                    {
                        id: Date.now() - 2000000,
                        name: 'Наушники Sony',
                        price: 12000,
                        seller: 'Елена',
                        sellerId: 'user2',
                        date: new Date().toLocaleString()
                    }
                ];
                saveProducts();
            }
            renderProducts();
        }

        // Сохранение товаров
        function saveProducts() {
            localStorage.setItem('secure_shop_products', JSON.stringify(products));
        }

        // Вход в систему
        function login() {
            const name = document.getElementById('loginName').value.trim();
            const adminCode = document.getElementById('adminCode').value;

            if (!name) {
                showNotification('⚠️ Введите имя!', 'error');
                return;
            }

            // Проверка на админа с новым кодом 6769
            const isAdmin = (adminCode === ADMIN_CODE);
            
            currentUser = {
                id: 'user_' + Date.now() + Math.random(),
                name: name,
                isAdmin: isAdmin,
                loginTime: new Date().toLocaleString()
            };

            // Сохраняем пользователя
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            
            // Прячем форму входа
            document.getElementById('loginSection').style.display = 'none';
            
            // Обновляем интерфейс
            updateUI();
            
            showNotification(`✅ Добро пожаловать, ${name}! ${isAdmin ? '(Админ)' : ''}`);
        }

        // Выход
        function logout() {
            currentUser = null;
            localStorage.removeItem('currentUser');
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('addFormSection').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'none';
            updateProfileSection();
            renderProducts();
            showNotification('👋 Вы вышли из системы');
        }

        // Обновление интерфейса
        function updateUI() {
            updateProfileSection();
            
            if (currentUser) {
                document.getElementById('addFormSection').style.display = 'block';
                
                if (currentUser.isAdmin) {
                    document.getElementById('adminPanel').style.display = 'block';
                    updateAdminStats();
                } else {
                    document.getElementById('adminPanel').style.display = 'none';
                }
            } else {
                document.getElementById('addFormSection').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'none';
            }
            
            renderProducts();
        }

        // Обновление профиля
        function updateProfileSection() {
            const profileDiv = document.getElementById('profileSection');
            
            if (currentUser) {
                profileDiv.innerHTML = `
                    <div class="user-info">
                        <div class="avatar">${currentUser.name.charAt(0).toUpperCase()}</div>
                        <div class="user-details">
                            <h4>${currentUser.name}</h4>
                            <small>В сети</small>
                        </div>
                        ${currentUser.isAdmin ? '<span class="badge admin">ADMIN</span>' : '<span class="badge">Покупатель</span>'}
                    </div>
                    <button class="logout-btn" onclick="logout()">Выйти</button>
                `;
            } else {
                profileDiv.innerHTML = `
                    <div class="user-info">
                        <div class="avatar">👤</div>
                        <div class="user-details">
                            <h4>Гость</h4>
                            <small>Войдите чтобы продавать</small>
                        </div>
                    </div>
                `;
            }
        }

        // Добавление товара
        function addProduct() {
            if (!currentUser) {
                showNotification('⚠️ Сначала войдите в систему!', 'error');
                return;
            }

            const name = document.getElementById('productName').value.trim();
            const price = document.getElementById('productPrice').value;

            if (!name) {
                showNotification('⚠️ Введите название товара!', 'error');
                return;
            }

            if (!price || price <= 0) {
                showNotification('⚠️ Введите корректную цену!', 'error');
                return;
            }

            const newProduct = {
                id: Date.now() + Math.random(),
                name: name,
                price: Number(price),
                seller: currentUser.name,
                sellerId: currentUser.id,
                date: new Date().toLocaleString()
            };

            products.push(newProduct);
            saveProducts();
            
            document.getElementById('productName').value = '';
            document.getElementById('productPrice').value = '';
            
            renderProducts();
            if (currentUser.isAdmin) updateAdminStats();
            
            showNotification('✅ Товар успешно добавлен!');
        }
