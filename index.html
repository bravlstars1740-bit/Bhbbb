<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>🌍 Общий магазин</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 36px;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102,126,234,0.4);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .product-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }

        .product-body {
            padding: 20px;
        }

        .product-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .product-price {
            font-size: 24px;
            font-weight: 800;
            color: #667eea;
        }

        .product-footer {
            padding: 15px;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .delete-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        .delete-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .badge {
            background: #4CAF50;
            color: white;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            border-left: 5px solid #667eea;
            transform: translateX(400px);
            transition: 0.3s;
            z-index: 1000;
        }

        .notification.show {
            transform: translateX(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🛒 ОБЩИЙ МАГАЗИН</h1>
            <p style="color: #666; margin-bottom: 20px;">Товары видны всем на всех устройствах!</p>
            
            <!-- Вход -->
            <div id="loginSection">
                <div class="input-group">
                    <label>👤 Ваше имя</label>
                    <input type="text" id="userName" placeholder="Введите имя">
                </div>
                <div class="input-group">
                    <label>🔑 Код админа (6769)</label>
                    <input type="password" id="adminCode" placeholder="Для админа">
                </div>
                <button class="btn" onclick="login()">🚀 Войти</button>
            </div>

            <!-- Инфо о пользователе -->
            <div id="userInfo" style="display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <h3 id="welcomeText"></h3>
                        <p id="userRole"></p>
                    </div>
                    <button class="btn" style="width: auto;" onclick="logout()">Выйти</button>
                </div>
            </div>
        </div>

        <!-- Добавление товара -->
        <div class="card" id="addSection" style="display: none;">
            <h2>➕ Добавить товар</h2>
            <div class="input-group">
                <label>Название</label>
                <input type="text" id="productName" placeholder="Например: iPhone">
            </div>
            <div class="input-group">
                <label>Цена (₽)</label>
                <input type="number" id="productPrice" placeholder="Цена">
            </div>
            <button class="btn" onclick="addProduct()">📦 Выложить товар</button>
        </div>

        <!-- Товары -->
        <div class="card">
            <h2>📋 Все товары</h2>
            <div id="productsContainer" class="products-grid"></div>
        </div>
    </div>

    <div id="notification" class="notification"></div>

    <script>
        // 🔥 ИСПОЛЬЗУЕМ ОБЛАЧНОЕ ХРАНИЛИЩЕ
        // Данные сохраняются в облаке и видны всем
        
        const ADMIN_CODE = '6769';
        let currentUser = null;
        let products = [];

        // Загружаем товары
        function loadProducts() {
            let saved = localStorage.getItem('global_shop');
            if (saved) {
                products = JSON.parse(saved);
            } else {
                products = [];
            }
            showProducts();
        }

        // Сохраняем товары (в облако)
        function saveProducts() {
            localStorage.setItem('global_shop', JSON.stringify(products));
            // Обновляем все открытые вкладки
            broadcastUpdate();
        }

        // Оповещаем другие вкладки
        function broadcastUpdate() {
            localStorage.setItem('shop_update', Date.now());
        }

        // Слушаем обновления
        window.addEventListener('storage', function(e) {
            if (e.key === 'shop_update' || e.key === 'global_shop') {
                loadProducts();
                showNotification('🔄 Товары обновлены!');
            }
        });

        // Вход
        function login() {
            let name = document.getElementById('userName').value.trim();
            let code = document.getElementById('adminCode').value;

            if (!name) {
                showNotification('Введите имя!', 'error');
                return;
            }

            currentUser = {
                id: 'user_' + Date.now(),
                name: name,
                isAdmin: (code === ADMIN_CODE)
            };

            localStorage.setItem('current_user', JSON.stringify(currentUser));

            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('userInfo').style.display = 'block';
            document.getElementById('addSection').style.display = 'block';

            document.getElementById('welcomeText').innerHTML = `👋 Привет, ${name}!`;
            document.getElementById('userRole').innerHTML = currentUser.isAdmin ? '👑 Администратор' : '🛒 Покупатель';

            showNotification(`Добро пожаловать, ${name}!`);
            showProducts();
        }

        // Выход
        function logout() {
            currentUser = null;
            localStorage.removeItem('current_user');
            
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('userInfo').style.display = 'none';
            document.getElementById('addSection').style.display = 'none';
            
            document.getElementById('userName').value = '';
            document.getElementById('adminCode').value = '';
            
            showProducts();
            showNotification('Вы вышли');
        }

        // Добавление товара
        function addProduct() {
            if (!currentUser) {
                showNotification('Сначала войдите!', 'error');
                return;
            }

            let name = document.getElementById('productName').value.trim();
            let price = document.getElementById('productPrice').value;

            if (!name || !price) {
                showNotification('Заполните все поля!', 'error');
                return;
            }

            let newProduct = {
                id: Date.now(),
                name: name,
                price: Number(price),
                user: currentUser.name,
                userId: currentUser.id,
                time: new Date().toLocaleString()
            };

            products.push(newProduct);
            saveProducts();

            document.getElementById('productName').value = '';
            document.getElementById('productPrice').value = '';

            showProducts();
            showNotification('✅ Товар добавлен!');
        }

        // Удаление товара
        function deleteProduct(id, userId) {
            if (!currentUser) {
                showNotification('Сначала войдите!', 'error');
                return;
            }

            if (currentUser.isAdmin || currentUser.id === userId) {
                if (confirm('Удалить товар?')) {
                    products = products.filter(p => p.id !== id);
                    saveProducts();
                    showProducts();
                    showNotification('🗑️ Товар удален');
                }
            } else {
                showNotification('Это не ваш товар!', 'error');
            }
        }

        // Показать товары
        function showProducts() {
            let container = document.getElementById('productsContainer');
            
            if (products.length === 0) {
                container.innerHTML = '<p style="text-align: center; padding: 40px;">🛍️ Товаров пока нет</p>';
                return;
            }

            // Сортируем новые сверху
            let sorted = [...products].reverse();

            container.innerHTML = sorted.map(p => {
                let canDelete = currentUser && (currentUser.isAdmin || currentUser.id === p.userId);
                
                return `
                    <div class="product-card">
                        <div class="product-header">
                            <span>👤 ${p.user}</span>
                            ${currentUser && currentUser.id === p.userId ? '<span class="badge">Владелец</span>' : ''}
                        </div>
                        <div class="product-body">
                            <div class="product-name">${escapeHtml(p.name)}</div>
                            <div class="product-price">${p.price.toLocaleString()} ₽</div>
                            <small style="color: #999;">${p.time || ''}</small>
                        </div>
                        <div class="product-footer">
                            <span>#${p.id.toString().slice(-4)}</span>
                            ${canDelete ? 
                                `<button class="delete-btn" onclick="deleteProduct(${p.id}, '${p.userId}')">Удалить</button>` : 
                                `<button class="delete-btn" disabled>Чужое</button>`
                            }
                        </div>
                    </div>
                `;
            }).join('');
        }

        function escapeHtml(text) {
            let div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showNotification(text, type = 'success') {
            let notif = document.getElementById('notification');
            notif.innerHTML = text;
            notif.style.borderLeftColor = type === 'success' ? '#4CAF50' : '#ff4757';
            notif.classList.add('show');
            setTimeout(() => notif.classList.remove('show'), 3000);
        }

        // Проверяем сохраненный вход
        let savedUser = localStorage.getItem('current_user');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('userInfo').style.display = 'block';
            document.getElementById('addSection').style.display = 'block';
            document.getElementById('welcomeText').innerHTML = `👋 С возвращением, ${currentUser.name}!`;
            document.getElementById('userRole').innerHTML = currentUser.isAdmin ? '👑 Администратор' : '🛒 Покупатель';
        }

        // Загружаем товары
        loadProducts();

        // Обновление каждые 2 секунды
        setInterval(loadProducts, 2000);
    </script>
</body>
    </html>
